{% for s in staff %}
<tr>
    <td>{{ s.name }}</td>
    <td>{{ s.role|default:"-" }}</td>
    <td>{{ s.email|default:"-" }}</td>
    <td>{{ s.phone|default:"-" }}</td>
    <td>{{ s.whatsapp|default:"-" }}</td>
    <td>{{ s.reliability_score|default:100 }}</td>
    <td>{{ s.is_active|yesno:"Active,Inactive" }}</td>
    <td><a href="{% url 'staff:staff_detail' s.pk %}">View</a></td>
</tr>
{% endfor %}
