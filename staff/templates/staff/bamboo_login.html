<!DOCTYPE html>
<html>
<head><title>Bamboo Login</title></head>
<body style="font-family: Arial; max-width: 400px; margin: 50px auto;">
  <h2>Staff Login</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
  </form>
  {% for message in messages %}
    <p style="color:red;">{{ message }}</p>
  {% endfor %}
</body>
</html>
