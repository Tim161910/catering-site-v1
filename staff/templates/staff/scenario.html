{% extends 'staff/base.html' %}

{% block title %}Scenario: {{ roleplay.name }}{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="card shadow-sm border-0">
    <div class="card-body">
      <h2 class="card-title mb-3">{{ roleplay.name }}</h2>
      <p class="text-muted mb-4">{{ roleplay.scenario }}</p>

      <form method="post" id="scenario-form">
        {% csrf_token %}
        <div class="mb-3">
          <label for="action" class="form-label fw-semibold">Your Action</label>
          <textarea 
            name="action" 
            id="action"
            class="form-control" 
            rows="8" 
            placeholder="Enter your action..."
            required
          ></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit Action</button>
      </form>

      {% if action %}
      <div class="alert alert-info mt-4">
        <strong>Last action:</strong> {{ action }}
      </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('scenario-form').addEventListener('submit', function() {
  const actionText = document.getElementById('action').value.trim();
  if (actionText) {
    showToast('Action submitted', 'bg-success');
  }
});
</script>
{% endblock %}
