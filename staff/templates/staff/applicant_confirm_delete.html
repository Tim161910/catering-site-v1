{% extends 'staff/base.html' %}

{% block title %}Delete Applicant{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <h3 class="text-danger mb-3">Delete Applicant</h3>
            <p>Are you sure you want to delete <strong>{{ applicant.name }}</strong>?</p>
            <p class="text-muted">This action is permanent and cannot be undone.</p>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'staff:applicant_detail' applicant.id %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
