{% extends "staff/base.html" %}
{% block content %}
<div class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg p-6 w-96 shadow-xl">
    <h2 class="text-xl font-bold text-gray-800 mb-4">Delete Staff</h2>
    <p class="text-gray-600 mb-6">Are you sure you want to delete <span class="font-semibold">{{ staff.name }}</span>? This action cannot be undone.</p>
    
    <div class="flex justify-end gap-3">
      <a href="{% url 'staff:staff_list' %}" class="px-4 py-2 border-gray-300 rounded-lg hover:bg-gray-50">Cancel</a>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg">Delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
